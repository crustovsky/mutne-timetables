name: Aktualizacja rozkładów

on:
  schedule:
    - cron: "0 4 * * 1"   # poniedziałek 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pobierz i sparsuj rozkłady
        run: python3 scripts/update_timetables.py

      - name: Commit jeśli są zmiany
        run: |
          git config user.name "timetable-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          if ! git diff --cached --quiet; then
            git commit -m "Aktualizacja rozkładów $(date +%F)"
            git push
          fi
